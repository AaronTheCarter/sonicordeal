<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVASTRIVE</title>
    <link rel="icon" type="image/png" href="icon.png">

    <style>
        body {
            margin: 0;
            background: black;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        @font-face {
            font-family: 'Undertale';
            src: url('undertale-deltarune-text-font-extended.ttf');
        }

        img {
            margin-top: 30px;
            width: 300px;
            image-rendering: pixelated;
        }

        .description {
            margin-top: 20px;
            color: white;
            font-family: 'Undertale', sans-serif;
            font-size: 24px;
            text-align: center;
            max-width: 900px;
            padding: 0 20px;
        }

        .steam-button {
            margin-top: 30px;
            width: 260px;
            animation: float 2s ease-in-out infinite;
            transition: transform 0.2s ease;
        }

        .steam-button:hover {
            transform: scale(1.05);
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }
            @keyframes beatPulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.08);
            }

        .showcase-image {
            display: block;
            margin-top: 40px;
            margin-left: auto;
            margin-right: auto;
            width: 500px;
            border-radius: 20px;
            animation: beatPulse 1s ease-in-out infinite;
        }

        .showcase-image:hover {
            transform: scale(1.02);
        }

        @keyframes beatPulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.08);
            }
            100% {
                transform: scale(1);
            }
        }

        
            25% {
                transform: scale(1.06);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }
            25% {
                transform: translateX(10px) translateY(-6px) rotate(1deg);
            }
            50% {
                transform: translateX(0px) translateY(8px) rotate(0deg);
            }
            75% {
                transform: translateX(-10px) translateY(-6px) rotate(-1deg);
            }
            100% {
                transform: translateX(0px) translateY(0px) rotate(0deg);
            }
        }
            50% {
                filter: drop-shadow(0 0 35px rgba(0, 170, 255, 0.9));
            }
            100% {
                filter: drop-shadow(0 0 15px rgba(0, 170, 255, 0.5));
            }
        }
            50% {
                transform: translateY(-10px);
            }
            100% {
                transform: translateY(0px);
            }
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="A Warning.mp3" type="audio/mpeg">
    </audio>

    <img src="logo_4x.png" alt="Logo" id="logo">

    <div class="description">
        NOVASTRIVE, created by first time developers is a Sci-Fi Indie RPG game about the Milky Way galaxy's inevitable collision with the Andromeda galaxy. Press Logo to toggle song
    </div>

    <a href="https://store.steampowered.com/app/4420170/Novastrive/" target="_blank">
        <img src="Steam_Button.png" alt="Steam Button" class="steam-button">
    </a>


    <img src="10b8440f174824f040417539c1821719.png" alt="Hover Image" class="showcase-image">

    <script>
        const logo = document.getElementById('logo');
        const music = document.getElementById('bg-music');

        let playing = false;

        logo.addEventListener('click', () => {
            if (playing) {
                music.pause();
            } else {
                music.play();
            }

            playing = !playing;
        });
    </script>

</body>
</html>
