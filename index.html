<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sonic Ordeal</title>

    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="sonic-icon.png">

    <style>
        @font-face {
            font-family: "Sonic2";
            src: url("sonic-2-system.otf");
        }

        body {
            margin: 0;
            background-color: yellow;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Center container */
        .container {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        /* Big logo */
        .logo {
            width: 300px;
            height: auto;
        }

        /* Big text */
        .info {
            font-family: "Sonic2", Arial, sans-serif;
            font-size: 24px;
            max-width: 500px;
            line-height: 1.4;
        }
    </style>
</head>

<body>

    <div class="container">
        <img src="sonic-ordeal-logo.png" class="logo" alt="Logo">

        <div class="info">
            Sonic Ordeal is a game made on Godot. In order to play it, download it and download the Godot app, right click the project and click "Run Project".
        </div>
    </div>

</body>
</html>
