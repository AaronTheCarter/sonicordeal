<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sonic Ordeal</title>

    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="sonic-icon.png">

    <style>
        @font-face {
            font-family: "Sonic2";
            src: url("sonic-2-system.otf");
        }

        body {
            margin: 0;
            background-color: yellow;
        }

        /* Top-left logo */
        .logo {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 150px;
            height: auto;
        }

        /* Top-right info text */
        .info {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 350px;
            font-family: "Sonic2", Arial, sans-serif;
            font-size: 14px;
            text-align: right;
            line-height: 1.4;
        }
    </style>
</head>

<body>

    <img src="sonic-ordeal-logo.png" class="logo" alt="Logo">

    <div class="info">
        Sonic Ordeal is a game made on Godot. In order to play it, download it and download the Godot app, right click the project and click "Run Project".
    </div>

</body>
</html>
